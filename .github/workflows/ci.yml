name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install package + all extras
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run --no-sync ruff check pyth_pandas tests

      - name: Ruff format check
        run: uv run --no-sync ruff format --check pyth_pandas tests

      - name: Mypy
        run: uv run --no-sync mypy pyth_pandas

      - name: Pytest (mocked)
        run: uv run --no-sync pytest tests/test_unit.py tests/test_async_unit.py -v
